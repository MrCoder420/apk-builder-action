name: React Native APK Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
    steps:
      - name: Clone Repo
        run: git clone https://github.com/priyanshusharma99/SoulShuffle .

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Universal Repair & Install
        run: |
          # 1. Install dependencies
          npm install --legacy-peer-deps
          npm install tailwindcss postcss @babel/runtime @expo/metro-config

          # 2. AUTO-DISCOVERY: Find and place the missing haptic-tab file
          # We use a temporary folder to avoid "copying onto itself" errors
          mkdir -p temp_components
          TARGET_FILE=$(find . -name "*haptic-tab*" -o -name "*HapticTab*" | head -n 1)
          if [ -n "$TARGET_FILE" ]; then
            cp "$TARGET_FILE" temp_components/haptic-tab.tsx
            mkdir -p components
            cp temp_components/haptic-tab.tsx components/haptic-tab.tsx || true
          fi

          # 3. ALIAS REPAIR: Force the system to recognize the '@/' shortcut
          echo '{"compilerOptions": {"baseUrl": ".", "paths": {"@/*": ["./*"]}}}' > tsconfig.json

          # 4. CONFIG REPAIR: Fresh metro config to ensure path resolution
          echo "const { getDefaultConfig } = require('@expo/metro-config');
          const config = getDefaultConfig(__dirname);
          module.exports = config;" > metro.config.js

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --no-install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: soulshuffle-apk
          path: android/app/build/outputs/apk/release/*.apk
