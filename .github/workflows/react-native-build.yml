name: React Native APK Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
    steps:
      - name: Clone Repo
        run: git clone https://github.com/priyanshusharma99/SoulShuffle .

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install tailwindcss postcss @babel/runtime

      - name: Brute Force Path Fix
        run: |
          # 1. Create app.json if missing
          if [ ! -f app.json ]; then
            echo '{"expo": {"name": "SoulShuffle", "slug": "soulshuffle", "version": "1.0.0", "android": {"package": "com.mrcoder.soulshuffle"}}}' > app.json
          fi
          
          # 2. Find and fix the HapticTab file location
          # We move it to a standard 'components' folder and force it to be lowercase
          mkdir -p components
          find . -name "*HapticTab*" -exec cp {} ./components/haptic-tab.tsx \; || true
          find . -name "*haptic-tab*" -exec cp {} ./components/haptic-tab.tsx \; || true

          # 3. REPLACE the broken alias in the code
          # This replaces "@/components/haptic-tab" with "../../components/haptic-tab" 
          # so it doesn't need the '@/' alias to work.
          find app -name "_layout.tsx" -exec sed -i 's|@/components/haptic-tab|../../components/haptic-tab|g' {} +

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --no-install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: soulshuffle-apk
          path: android/app/build/outputs/apk/release/*.apk
