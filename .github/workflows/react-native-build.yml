name: React Native APK Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
    steps:
      - name: Clone Repo
        run: git clone https://github.com/priyanshusharma99/SoulShuffle .

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install tailwindcss postcss @babel/runtime

      - name: Fix Expo Config & Cache
        run: |
          # Ensure an app.json exists with basic info to satisfy the bundler
          if [ ! -f app.json ]; then
            echo '{"expo": {"name": "SoulShuffle", "slug": "soulshuffle", "version": "1.0.0"}}' > app.json
          fi
          # Clear metro cache to force fresh path resolution
          rm -rf /tmp/metro-cache

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --skip-dependency-install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: soulshuffle-apk
          path: android/app/build/outputs/apk/release/*.apk
