name: React Native APK Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
    steps:
      - name: Clone Repo
        run: git clone https://github.com/priyanshusharma99/SoulShuffle .

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install tailwindcss postcss @babel/runtime

      - name: Fix Config and Case Sensitivity
        run: |
          # Create app.json if missing
          if [ ! -f app.json ]; then
            echo '{"expo": {"name": "SoulShuffle", "slug": "soulshuffle", "version": "1.0.0", "android": {"package": "com.mrcoder.soulshuffle"}}}' > app.json
          fi
          # Clear any stuck cache
          rm -rf /tmp/metro-cache
          # Force the bundler to see the haptic-tab file even if it's named differently
          find . -name "HapticTab.tsx" -exec cp {} ./components/haptic-tab.tsx \; 2>/dev/null || true

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --no-install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: soulshuffle-apk
          path: android/app/build/outputs/apk/release/*.apk
